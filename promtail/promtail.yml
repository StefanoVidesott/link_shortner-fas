server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: [running]
    relabel_configs:
      # Only collect from the flask container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: flask
        action: keep
      # job = compose service name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: job
      # container = container name (strip leading slash)
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
    pipeline_stages:
      # Flask logs in JSON via python-json-logger
      - json:
          expressions:
            level: levelname
            message: message
            method: method
            path: path
            status_code: status_code
      # Promote level as an indexed label (low cardinality)
      - labels:
          level:
      # Drop high-frequency automated 200s — data already captured in Prometheus
      - drop:
          expression: '.*"path": "/health".*"status_code": "200".*'
          drop_counter_reason: health_check
      - drop:
          expression: '.*"path": "/metrics".*"status_code": "200".*'
          drop_counter_reason: metrics_scrape
